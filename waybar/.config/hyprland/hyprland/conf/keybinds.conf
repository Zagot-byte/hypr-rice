# ── Keybinds ─────────────────────────────────────────────────────────────────
# Lines ending with `# [hidden]` won't be shown on cheatsheet
# Lines starting with ##! are section headings

exec = hyprctl dispatch submap global
submap = global

$mainMod = SUPER

##! Shell
bindid  = Super, Super_L, Toggle launcher, global, quickshell:searchToggleRelease
bindid  = Super, Super_R, Toggle launcher, global, quickshell:searchToggleRelease # [hidden]
binditn = Super, catchall, global, quickshell:searchToggleReleaseInterrupt # [hidden]
bind    = Ctrl, Super_L, global, quickshell:searchToggleReleaseInterrupt # [hidden]
bind    = Ctrl, Super_R, global, quickshell:searchToggleReleaseInterrupt # [hidden]
bind    = Super, mouse:272, global, quickshell:searchToggleReleaseInterrupt # [hidden]
bind    = Super, mouse:273, global, quickshell:searchToggleReleaseInterrupt # [hidden]

bindit  = , Super_L, global, quickshell:workspaceNumber # [hidden]
bindit  = , Super_R, global, quickshell:workspaceNumber # [hidden]

bind = Super, Tab,   global, quickshell:overviewWorkspacesToggle    # Toggle overview
bind = Super, V,     global, quickshell:overviewClipboardToggle     # Clipboard history
bind = Super, Period,global, quickshell:overviewEmojiToggle         # Emoji picker
bind = Super, N,     global, quickshell:sidebarRightToggle          # Toggle right sidebar
bind = Super, Slash, global, quickshell:cheatsheetToggle            # Toggle cheatsheet
bind = Super, M,     global, quickshell:mediaControlsToggle         # Toggle media controls
bind = Ctrl+Alt, Delete, global, quickshell:sessionToggle           # Session menu

bind = Ctrl+Super, R, exec, killall qs quickshell; qs -c $qsConfig & # Restart widgets

##! Apps
bind = Super,       Return, exec, $terminal       # Terminal
bind = Super,       T,      exec, $terminal       # [hidden]
bind = Ctrl+Alt,    T,      exec, $terminal       # [hidden]
bind = Super,       E,      exec, $fileManager    # File manager
bind = Super,       W,      exec, $browser        # Browser
bind = Super,       C,      exec, $editor         # Code editor
bind = Super,       X,      exec, $textEditor     # Text editor
bind = Ctrl+Super,  V,      exec, $volumeMixer    # Volume mixer
bind = Ctrl+Shift,  Escape, exec, $taskManager    # Task manager

##! Utilities
# Screenshots
bind = Super,       S,        exec, grim -g "$(slurp)" - | wl-copy && notify-send "Selection copied"  # Screenshot region
bind = Super+Shift, S,        exec, ~/.config/hypr/scripts/snip_to_search.sh                          # Google Lens
bind = ,            Print,    exec, grim -o "$(hyprctl activeworkspace -j | jq -r '.monitor')" - | wl-copy # Screenshot monitor
bind = Ctrl,        Print,    exec, mkdir -p ~/Pictures/Screenshots && grim -o "$(hyprctl activeworkspace -j | jq -r '.monitor')" ~/Pictures/Screenshots/Screenshot_"$(date '+%Y-%m-%d_%H.%M.%S')".png # Screenshot to file

# Recording
bindl = Super+Shift, R, global, quickshell:regionRecord         # Record region
bindl = Ctrl+Alt,    R, exec, ~/.config/quickshell/$qsConfig/scripts/videos/record.sh --fullscreen    # Record fullscreen
bindl = Super+Shift+Alt, R, exec, ~/.config/quickshell/$qsConfig/scripts/videos/record.sh --fullscreen --sound # Record with sound

# Color picker
bind = Super+Shift, C, exec, hyprpicker -a # Pick color >> clipboard

# Clipboard fallback
bind = Super, V, exec, qs -c $qsConfig ipc call TEST_ALIVE || cliphist list | rofi -dmenu | cliphist decode | wl-copy # [hidden]

##! Window
bindm = Super, mouse:272, movewindow  # Move
bindm = Super, mouse:273, resizewindow # Resize

bind = Super, Left,  movefocus, l # [hidden]
bind = Super, Right, movefocus, r # [hidden]
bind = Super, Up,    movefocus, u # [hidden]
bind = Super, Down,  movefocus, d # [hidden]

bind = Super+Shift, Left,  movewindow, l # [hidden]
bind = Super+Shift, Right, movewindow, r # [hidden]
bind = Super+Shift, Up,    movewindow, u # [hidden]
bind = Super+Shift, Down,  movewindow, d # [hidden]

binde = Super, Semicolon,  layoutmsg, splitratio -0.1 # [hidden]
binde = Super, Apostrophe, layoutmsg, splitratio +0.1 # [hidden]

bind = Super+Alt, Space, togglefloating  # Float/Tile
bind = Super,     D,     fullscreen, 1   # Maximize
bind = Super,     F,     fullscreen, 0   # Fullscreen
bind = Super,     P,     pin             # Pin
bind = Alt,       F4,    killactive      # [hidden]
bind = Super,     Q,     killactive      # Close window

##! Workspaces
bind = Super, code:10, workspace, 1  # [hidden]
bind = Super, code:11, workspace, 2  # [hidden]
bind = Super, code:12, workspace, 3  # [hidden]
bind = Super, code:13, workspace, 4  # [hidden]
bind = Super, code:14, workspace, 5  # [hidden]
bind = Super, code:15, workspace, 6  # [hidden]
bind = Super, code:16, workspace, 7  # [hidden]
bind = Super, code:17, workspace, 8  # [hidden]
bind = Super, code:18, workspace, 9  # [hidden]
bind = Super, code:19, workspace, 10 # [hidden]

bind = Super+Shift, code:10, movetoworkspacesilent, 1  # [hidden]
bind = Super+Shift, code:11, movetoworkspacesilent, 2  # [hidden]
bind = Super+Shift, code:12, movetoworkspacesilent, 3  # [hidden]
bind = Super+Shift, code:13, movetoworkspacesilent, 4  # [hidden]
bind = Super+Shift, code:14, movetoworkspacesilent, 5  # [hidden]
bind = Super+Shift, code:15, movetoworkspacesilent, 6  # [hidden]
bind = Super+Shift, code:16, movetoworkspacesilent, 7  # [hidden]
bind = Super+Shift, code:17, movetoworkspacesilent, 8  # [hidden]
bind = Super+Shift, code:18, movetoworkspacesilent, 9  # [hidden]
bind = Super+Shift, code:19, movetoworkspacesilent, 10 # [hidden]

bind = Super+Alt, code:10, movetoworkspace, 1  # [hidden]
bind = Super+Alt, code:11, movetoworkspace, 2  # [hidden]
bind = Super+Alt, code:12, movetoworkspace, 3  # [hidden]
bind = Super+Alt, code:13, movetoworkspace, 4  # [hidden]
bind = Super+Alt, code:14, movetoworkspace, 5  # [hidden]
bind = Super+Alt, code:15, movetoworkspace, 6  # [hidden]
bind = Super+Alt, code:16, movetoworkspace, 7  # [hidden]
bind = Super+Alt, code:17, movetoworkspace, 8  # [hidden]
bind = Super+Alt, code:18, movetoworkspace, 9  # [hidden]
bind = Super+Alt, code:19, movetoworkspace, 10 # [hidden]

bind = Ctrl+Super, Right,      workspace, r+1  # [hidden]
bind = Ctrl+Super, Left,       workspace, r-1  # [hidden]
bind = Super,      Page_Down,  workspace, +1   # [hidden]
bind = Super,      Page_Up,    workspace, -1   # [hidden]
bind = Super,      mouse_up,   workspace, +1   # [hidden]
bind = Super,      mouse_down, workspace, -1   # [hidden]

bind = Super,     S,   togglespecialworkspace    # Toggle scratchpad
bind = Super+Alt, S,   movetoworkspacesilent, special # Send to scratchpad

##! Screen
binde = Super, Minus, exec, ~/.config/hypr/scripts/zoom.sh decrease 0.3 # Zoom out
binde = Super, Equal, exec, ~/.config/hypr/scripts/zoom.sh increase 0.3 # Zoom in
bind  = Super, 0,     exec, ~/.config/hypr/scripts/zoom.sh reset        # Reset zoom

##! Media
bindl = Super+Shift, N, exec, playerctl next        # Next track
bindl = Super+Shift, B, exec, playerctl previous    # Previous track
bindl = Super+Shift, P, exec, playerctl play-pause  # Play/pause
bindl = , XF86AudioNext,  exec, playerctl next      # [hidden]
bindl = , XF86AudioPrev,  exec, playerctl previous  # [hidden]
bindl = , XF86AudioPlay,  exec, playerctl play-pause # [hidden]
bindl = , XF86AudioPause, exec, playerctl play-pause # [hidden]

##! Volume & Brightness
bindel = , XF86AudioRaiseVolume,  exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume,  exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl  = , XF86AudioMute,         exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindl  = , XF86AudioMicMute,      exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = , XF86MonBrightnessUp,   exec, brightnessctl -e4 -n2 set 5%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-
bindl  = Super+Shift, M, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle   # Toggle mute
bindl  = Super+Alt,   M, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle # Toggle mic

##! Session
bind = Super,              L,      exec, loginctl lock-session  # Lock
bind = Super+Shift,        L,      exec, systemctl suspend      # Suspend
bind = Super+Shift,        E,      exec, wlogout                # Session menu
bind = Ctrl+Shift+Alt+Super, Delete, exec, systemctl poweroff   # [hidden] Shutdown
bind = Super+Shift,        R,      exec, ~/.config/hypr/scripts/reload.sh # Reload config

##! Virtual Machine
bind = Super+Alt, F1, exec, notify-send 'Entered VM submap' 'Hit Super+Alt+F1 to escape' -a 'Hyprland' && hyprctl dispatch submap virtual-machine # Disable keybinds
submap = virtual-machine
bind = Super+Alt, F1, exec, notify-send 'Exited VM submap' 'Keybinds re-enabled' -a 'Hyprland' && hyprctl dispatch submap global # [hidden]
submap = global
