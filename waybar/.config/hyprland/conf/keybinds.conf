# ── Keybinds ─────────────────────────────────────────────────────────────────
 $mainMod = SUPER f
# ── Terminal & Apps ───────────────────────────────────────────────────────────
bind = $mainMod,       Return, exec, $terminal
bind = $mainMod,       T,      exec, $terminal
bind = Ctrl+Alt,       T,      exec, $terminal
bind = $mainMod,       E,      exec, $fileManager
bind = $mainMod,       W,      exec, $browser
bind = $mainMod,       C,      exec, $editor
bind = $mainMod, Space, exec, quickshell
bindr = SUPER, SUPER_L, exec, quickshell
bind = $mainMod+Shift, Space,  exec, rofi -show run
bind = Ctrl+Shift,     Escape, exec, kitty -e btop

# ── Window Management ─────────────────────────────────────────────────────────
bind = $mainMod,       Q,      killactive
bind = Alt,            F4,     killactive
bind = $mainMod,       F,      togglefloating
bind = $mainMod+Alt,   Space,  togglefloating
bind = $mainMod,       D,      fullscreen, 1
bind = $mainMod+Alt,   F,      fullscreen, 0
bind = $mainMod,       P,      pin
bind = $mainMod,       J,      layoutmsg, togglesplit
bind = $mainMod,       pseudo, pseudo

# Split ratio
binde = $mainMod,      Semicolon,  splitratio, -0.1
binde = $mainMod,      Apostrophe, splitratio, +0.1

# Zoom
binde = $mainMod,      Minus,  exec, hyprctl keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor | awk '/float/{print $2 - 0.3}')
binde = $mainMod,      Equal,  exec, hyprctl keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor | awk '/float/{print $2 + 0.3}')

# ── Focus ─────────────────────────────────────────────────────────────────────
bind = $mainMod,       left,   movefocus, l
bind = $mainMod,       right,  movefocus, r
bind = $mainMod,       up,     movefocus, u
bind = $mainMod,       down,   movefocus, d

# Move window
bind = $mainMod+Shift, left,   movewindow, l
bind = $mainMod+Shift, right,  movewindow, r
bind = $mainMod+Shift, up,     movewindow, u
bind = $mainMod+Shift, down,   movewindow, d

# ── Workspaces ────────────────────────────────────────────────────────────────
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Scroll workspaces
bind = $mainMod,       mouse_down, workspace, e+1
bind = $mainMod,       mouse_up,   workspace, e-1
bind = Ctrl+$mainMod,  Right,      workspace, r+1
bind = Ctrl+$mainMod,  Left,       workspace, r-1
bind = $mainMod,       Page_Down,  workspace, +1
bind = $mainMod,       Page_Up,    workspace, -1

# Workspace Overview & Sidebar
bind = $mainMod,       Tab,        exec, quickshell overview
bind = $mainMod,       Right,      exec, quickshell sidebar

# ── Send window to workspace (silent, no follow) ──────────────────────────────
bind = $mainMod+Shift, 1, movetoworkspacesilent, 1
bind = $mainMod+Shift, 2, movetoworkspacesilent, 2
bind = $mainMod+Shift, 3, movetoworkspacesilent, 3
bind = $mainMod+Shift, 4, movetoworkspacesilent, 4
bind = $mainMod+Shift, 5, movetoworkspacesilent, 5
bind = $mainMod+Shift, 6, movetoworkspacesilent, 6
bind = $mainMod+Shift, 7, movetoworkspacesilent, 7
bind = $mainMod+Shift, 8, movetoworkspacesilent, 8
bind = $mainMod+Shift, 9, movetoworkspacesilent, 9
bind = $mainMod+Shift, 0, movetoworkspacesilent, 10

# Move and follow
bind = $mainMod+Alt, 1, movetoworkspace, 1
bind = $mainMod+Alt, 2, movetoworkspace, 2
bind = $mainMod+Alt, 3, movetoworkspace, 3
bind = $mainMod+Alt, 4, movetoworkspace, 4
bind = $mainMod+Alt, 5, movetoworkspace, 5
bind = $mainMod+Alt, 6, movetoworkspace, 6
bind = $mainMod+Alt, 7, movetoworkspace, 7
bind = $mainMod+Alt, 8, movetoworkspace, 8
bind = $mainMod+Alt, 9, movetoworkspace, 9
bind = $mainMod+Alt, 0, movetoworkspace, 10

# ── Special workspace (scratchpad) ────────────────────────────────────────────
bind = $mainMod,       S,      togglespecialworkspace
bind = $mainMod+Alt,   S,      movetoworkspacesilent, special

# ── Move/resize with mouse ────────────────────────────────────────────────────
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
bindm = $mainMod, mouse:274, movewindow

# ── Screenshots ───────────────────────────────────────────────────────────────
bind = ,           Print,          exec, mkdir -p ~/Pictures/screenshots && grim ~/Pictures/screenshots/$(date +%Y%m%d_%H%M%S).png && notify-send "Screenshot saved"
bind = Ctrl,       Print,          exec, grim - | wl-copy && notify-send "Screenshot copied"
bind = $mainMod,       S,          exec, grim -g "$(slurp)" - | wl-copy && notify-send "Selection copied"
bind = $mainMod+Shift, S,          exec, ~/.config/hypr/scripts/lens.sh
bind = $mainMod+Shift, C,          exec, hyprpicker -a && notify-send "Color copied"

# ── Clipboard ─────────────────────────────────────────────────────────────────
bind = $mainMod,   V, exec, quickshell clipboard

# ── Cheatsheet ────────────────────────────────────────────────────────────────
bind = $mainMod,   slash, exec, quickshell cheatsheet

# ── Session ───────────────────────────────────────────────────────────────────
bind = $mainMod,       L,      exec, loginctl lock-session
bind = $mainMod+Shift, L,      exec, systemctl suspend
bind = $mainMod+Shift, E,      exec, wlogout
bind = $mainMod,       M,      exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit
bind = Ctrl+Shift+Alt+$mainMod, Delete, exec, systemctl poweroff

# ── Reload ────────────────────────────────────────────────────────────────────
bind = $mainMod+Shift, R, exec, ~/.config/hypr/scripts/reload.sh

# ── Media ─────────────────────────────────────────────────────────────────────
bindl  = ,           XF86AudioNext,        exec, playerctl next
bindl  = ,           XF86AudioPrev,        exec, playerctl previous
bindl  = ,           XF86AudioPlay,        exec, playerctl play-pause
bindl  = ,           XF86AudioPause,       exec, playerctl play-pause
bindl  = $mainMod+Shift, N,               exec, playerctl next
bindl  = $mainMod+Shift, B,               exec, playerctl previous
bindl  = $mainMod+Shift, P,               exec, playerctl play-pause

# ── Volume & Brightness ───────────────────────────────────────────────────────
bindel = , XF86AudioRaiseVolume,  exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume,  exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = , XF86AudioMute,         exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = , XF86AudioMicMute,      exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = , XF86MonBrightnessUp,   exec, brightnessctl -e4 -n2 set 5%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-
bindl  = $mainMod+Shift, M,       exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindl  = $mainMod+Alt,   M,       exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle


# Wallpaper

bind = $mainMod+Shift, W, exec, ~/,config/hypr/scripts/wallpaper.sh
bind = $mainMod+Shift, W, exec, ~/,config/hypr/scripts/wallpaper-random.sh
