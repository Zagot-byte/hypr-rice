# ── Font ─────────────────────────────────────────────
font_family      JetBrains Mono
bold_font        JetBrains Mono Bold
italic_font      JetBrains Mono Italic
font_size        11.0

# ── Window ───────────────────────────────────────────
window_padding_width        12
hide_window_decorations     yes
remember_window_size        no
background_opacity          0.8
dynamic_background_opacity  yes
scrollbar_handle_opacity    0
scrollbar_track_opacity     0
scrollbar_track_hover_opacity 0
confirm_os_window_close     0


# ── Cursor ───────────────────────────────────────────
cursor_shape         beam
cursor_blink_interval 0

# ── Scrollback ───────────────────────────────────────
scrollback_lines 10000

# ── Tab bar ──────────────────────────────────────────
tab_bar_style             powerline
tab_powerline_style       slanted
tab_bar_min_tabs          1

# ── Bell ─────────────────────────────────────────────
enable_audio_bell no
visual_bell_duration 0.0

# ── Keybindings ──────────────────────────────────────
# Copy / Paste
map ctrl+c copy_or_interrupt
map ctrl+v paste_from_clipboard
map ctrl+shift+c copy_to_clipboard

# shell
shell fish
shell_integration disabled
# Tabs
map ctrl+t new_tab_with_cwd
map ctrl+w close_tab
map ctrl+tab next_tab
map ctrl+shift+tab previous_tab

# Font size
map ctrl+equal  change_font_size all +1.0
map ctrl+minus  change_font_size all -1.0
map ctrl+0      change_font_size all 0

# Scrollback
map ctrl+shift+k scroll_line_up
map ctrl+shift+j scroll_line_down
map ctrl+shift+u scroll_page_up
map ctrl+shift+d scroll_page_down

# ── Tab title & window title ──────────────────────────
tab_title_template        "{index}: {tab.active_wd.replace('/home/zagot', '~')}"
window_title_format       "{title}"

# ── Dynamic window sizing ─────────────────────────────
remember_window_size      yes
resize_in_steps           yes
resize_draw_strategy      static
# ── Kittens ───────────────────────────────────────────
map ctrl+f kitten search.py
map ctrl+shift+m kitten scroll_mark.py

# ── Theme (Rose x Grey) ──────────────────────────────
include theme.conf
