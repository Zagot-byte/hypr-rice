# ── General ───────────────────────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 10000

# ── Vi Mode ───────────────────────────────────────────────────────────────────
setw -g mode-keys vi
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-pipe-and-cancel "wl-copy"

# ── Keybindings ───────────────────────────────────────────────────────────────
# Change prefix from C-b to C-a
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# Split panes
bind | split-window -h
bind - split-window -v
unbind '"'
unbind %

# Reload config
bind r source-file ~/.config/tmux/tmux.conf \; display-message "Config reloaded"

# ── Kanagawa Dragon Theme ─────────────────────────────────────────────────────

# Colors
# Base: #181616
# Surface: #1d1c19
# Overlay: #282727
# Text: #c5c9c5
# Red: #c4746e
# Gold: #c4b28a
# Green: #8a9a7b

set -g status-style "bg=#1d1c19,fg=#c5c9c5"

# Panes
set -g pane-border-style "fg=#282727"
set -g pane-active-border-style "fg=#c4746e"

# Window segments
set -g window-status-format " #I:#W "
set -g window-status-current-format "#[bg=#c4746e,fg=#181616,bold] #I:#W "
set -g window-status-separator ""

# Status Left
set -g status-left-length 50
set -g status-left "#[bg=#8a9a7b,fg=#181616,bold] #S #[bg=#1d1c19,fg=#8a9a7b] "

# Status Right
set -g status-right-length 100
set -g status-right "#[fg=#c4b28a] #(cd #{pane_current_path}; git rev-parse --abbrev-ref HEAD 2>/dev/null) #[fg=#282727]│ #[fg=#c5c9c5]%H:%M #[fg=#282727]│ #[fg=#c4746e]#{battery_percentage} "

# Message
set -g message-style "bg=#282727,fg=#c5c9c5"
set -g message-command-style "bg=#282727,fg=#c5c9c5"

# ── Plugins ───────────────────────────────────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-battery'
