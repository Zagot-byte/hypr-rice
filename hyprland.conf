# ── Hyprland Master Config ──────────────────────────
# This file only sources modular configs, edit those instead

# Load order matters — colors and monitors first
source = ~/.config/hypr-config/conf/colors.conf
source = ~/.config/hypr-config/conf/monitors.conf

# Core look and feel
source = ~/.config/hypr-config/conf/general.conf
source = ~/.config/hypr-config/conf/decoration.conf
source = ~/.config/hypr-config/conf/animations.conf

# Behavior
source = ~/.config/hypr-config/conf/windowrules.conf
source = ~/.config/hypr-config/conf/keybinds.conf

# Launch
source = ~/.config/hypr-config/conf/autostart.conf
