# ── Autostart ────────────────────────────────────────
# Programs launched once on Hyprland start
# Add exec-once for daemons, bars, and background services

exec-once = waybar
exec-once = dunst
exec-once = swww-daemon
exec-once = hyprpaper
exec-once = swww img ~/.config/hypr-config/wallpaper/background.png --transition-type fade
