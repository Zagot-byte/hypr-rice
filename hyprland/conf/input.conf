# ── Input ────────────────────────────────────────────
# Keyboard, mouse, touchpad and gesture settings
# Touchpad gestures and sensitivity tuned for laptop use



input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.
	repeat_rate = 50
	repeat_delay = 200
    touchpad {
        natural_scroll = true
        tap-to-click = true
    }
}

gesture = 3, horizontal, workspace

device {
    name = epic-mouse-v1
    sensitivity = -0.5
}
