[manager]
ratio          = [1, 2, 5]
sort_by        = "natural"
sort_sensitive = false
sort_reverse   = false
show_hidden    = true
show_symlink   = true

[preview]
tab_size   = 2
max_width  = 600
max_height = 900

[opener]
edit = [{ run = 'nvim "$@"', block = true }]
open = [{ run = 'xdg-open "$@"' }]

[open]
rules = [
    { mime = "text/*",        use = "edit" },
    { mime = "application/*", use = "open" },
]
